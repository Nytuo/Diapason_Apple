name: Diapason
options:
  bundleIdPrefix: fr.nytuo
  deploymentTarget:
    tvOS: "26.0"
    watchOS: "26.0"
packages:
  SwiftSonic:
    url: https://github.com/MathieuDubart/swiftsonic
    branch: main
  AudioStreaming:
    url: https://github.com/dimitris-c/AudioStreaming
    branch: main
  YouTubeKit:
    url: https://github.com/alexeichhorn/YouTubeKit
    from: "0.2.4"

# The iPhone/iPad app is gone. Phones and desktops are served by the Flutter app
# (diapason_flutter); this project keeps only what Flutter cannot target — Apple
# TV, and the Watch app. The two ecosystems talk over Diapason Connect
# (_diapason-connect._tcp), which is why the TV declares it below.
targets:
  DiapasonTV:
    type: application
    platform: tvOS
    deploymentTarget: "26.0"
    sources:
      - path: Sources
        excludes:
          - "Info-tvOS.plist"
      - path: TVSupport
    dependencies:
      - package: SwiftSonic
      - package: AudioStreaming
      - package: YouTubeKit
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIconTV
        ASSETCATALOG_COMPILER_GENERATE_ASSET_SYMBOLS: "YES"
        ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: "YES"
        INFOPLIST_KEY_CFBundleDisplayName: Diapason
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "3"
        ENABLE_PREVIEWS: "YES"
    info:
      path: Sources/Info-tvOS.plist
      properties:
        UIBackgroundModes: [audio]
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        # Without these, Connect discovery silently finds nothing on tvOS while
        # everything else looks fine.
        NSLocalNetworkUsageDescription: "Diapason finds your music servers, and other Diapason devices, on your local network."
        NSBonjourServices:
          - "_subsonic._tcp"
          - "_plexmediasvr._tcp"
          - "_diapason._tcp"
          - "_diapason-connect._tcp"

  # A standalone watch app. It no longer installs as the companion of an iOS app
  # — there isn't one — and reaches the Flutter phone over Diapason Connect
  # instead of WatchConnectivity, which can only ever talk to its own container.
  DiapasonWatch:
    type: application
    platform: watchOS
    deploymentTarget: "26.0"
    sources:
      - path: WatchApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: fr.nytuo.diapason.watchkitapp
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "4"
    info:
      path: WatchApp/Info.plist
      properties:
        CFBundleDisplayName: Diapason
        WKApplication: true
        # Standalone: no WKCompanionAppBundleIdentifier, because there is no
        # companion to point at.
        WKRunsIndependentlyOfCompanionApp: true
        # The watch talks to the phone over the LAN and streams from the music
        # server. Without these, Bonjour finds nothing and every request fails
        # while the UI looks perfectly healthy.
        NSLocalNetworkUsageDescription: "Diapason finds the Diapason app on your network to sync your music."
        NSBonjourServices:
          - "_diapason-connect._tcp"
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true

schemes:
  DiapasonTV:
    build:
      targets:
        DiapasonTV: all
    run:
      config: Debug
  DiapasonWatch:
    build:
      targets:
        DiapasonWatch: all
    run:
      config: Debug
