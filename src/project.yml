name: Diapason
options:
  bundleIdPrefix: fr.nytuo
  deploymentTarget:
    iOS: "26.0"
packages:
  SwiftSonic:
    url: https://github.com/MathieuDubart/swiftsonic
    branch: main
  AudioStreaming:
    url: https://github.com/dimitris-c/AudioStreaming
    branch: main
  YouTubeKit:
    url: https://github.com/alexeichhorn/YouTubeKit
    from: "0.2.4"
targets:
  Diapason:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: Sources
        excludes:
          - "Views/Platform/macOS/**"
    dependencies:
      - package: SwiftSonic
      - package: AudioStreaming
      - package: YouTubeKit
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GENERATE_ASSET_SYMBOLS: "YES"
        ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: "YES"
        INFOPLIST_KEY_CFBundleDisplayName: Diapason
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1,2"
        ENABLE_PREVIEWS: "YES"
    info:
      path: Sources/Info.plist
      properties:
        UIBackgroundModes: [audio, processing]
        BGTaskSchedulerPermittedIdentifiers:
          - app.cassette.wrapped.monthly-update
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        NSLocalNetworkUsageDescription: "Diapason needs to find your Subsonic and Plex servers on your local network."
        NSBonjourServices:
          - "_subsonic._tcp"
          - "_plexmediasvr._tcp"
          - "_diapason._tcp"
        UILaunchScreen:
          UIColorName: LaunchBackground
          UIImageName: LaunchScreen
          UIImageRespectsSafeAreaInsets: true
